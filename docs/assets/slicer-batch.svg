<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" role="img" aria-label="Animated Slicer Forge batch pipeline — folders through de-id into 3D volumes">
  <defs>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="vol" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <rect x="6" y="6" width="508" height="188" rx="20" fill="url(#panel)" stroke="#334155" stroke-width="2"/>

  <!-- Input folder -->
  <g transform="translate(24,40)">
    <path d="M8 20 H52 L64 8 H120 V108 H8 Z" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="64" y="34" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#bae6fd">DICOM/</text>
    <rect x="20" y="44" width="80" height="8" rx="2" fill="#0ea5e9" opacity="0.5"/>
    <rect x="20" y="58" width="64" height="8" rx="2" fill="#0ea5e9" opacity="0.35"/>
    <rect x="20" y="72" width="72" height="8" rx="2" fill="#0ea5e9" opacity="0.45"/>
    <text x="64" y="98" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#94a3b8">study folder</text>
  </g>

  <!-- Pipeline steps -->
  <g transform="translate(168,52)">
    <rect x="0" y="0" width="52" height="28" rx="6" fill="#134e4a" stroke="#2dd4bf"/>
    <text x="26" y="18" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#ccfbf1">de-id</text>
    <rect x="62" y="0" width="52" height="28" rx="6" fill="#1e3a5f" stroke="#38bdf8"/>
    <text x="88" y="18" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#bae6fd">QC</text>
    <rect x="124" y="0" width="52" height="28" rx="6" fill="#312e81" stroke="#a78bfa"/>
    <text x="150" y="18" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#e9d5ff">NRRD</text>
    <circle cx="26" cy="14" r="3" fill="#4ade80" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.2;0.8;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="88" cy="14" r="3" fill="#4ade80" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.25;0.45;0.8;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="14" r="3" fill="#4ade80" opacity="0">
      <animate attributeName="opacity" values="0;0;0;1;1" keyTimes="0;0.45;0.6;0.8;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <path d="M8 56 H184" stroke="#475569" stroke-width="2" stroke-dasharray="6 4">
      <animate attributeName="stroke-dashoffset" values="20;0" dur="1.2s" repeatCount="indefinite"/>
    </path>
    <polygon points="184,56 176,52 176,60" fill="#64748b"/>
  </g>

  <!-- 3D Slicer scene -->
  <g transform="translate(360,34)">
    <rect x="0" y="0" width="136" height="150" rx="12" fill="#0b1220" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="68" y="20" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#c4b5fd">3D SLICER SCENE</text>
    <g transform="translate(68,88)">
      <polygon points="-28,24 0,-32 28,24" fill="url(#vol)" opacity="0.85">
        <animateTransform attributeName="transform" type="rotate" values="0;6;0;-6;0" dur="4s" repeatCount="indefinite" additive="sum"/>
      </polygon>
      <polygon points="-18,30 0,-8 18,30" fill="#38bdf8" opacity="0.55">
        <animateTransform attributeName="transform" type="rotate" values="0;-4;0;4;0" dur="3.2s" repeatCount="indefinite" additive="sum"/>
      </polygon>
    </g>
    <rect x="20" y="118" width="96" height="22" rx="6" fill="#14532d" stroke="#4ade80" stroke-width="1"/>
    <text x="68" y="133" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#bbf7d0">LOADED</text>
  </g>

  <text x="260" y="192" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#64748b">pick folder → pipeline → volumes in Slicer</text>
</svg>