<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="Slicer Forge — 3D Slicer extension for DICOM batch import">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="45%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="300" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="300" rx="24" fill="url(#glow)"/>
  <text x="600" y="108" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="url(#title)">Slicer Forge</text>
  <text x="600" y="148" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" fill="#94a3b8">Batch DICOM import inside 3D Slicer — de-id, QC, convert, load</text>
  <text x="600" y="182" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="15" fill="#cbd5e1">Thin GUI on top of the headless dicom-forge pipeline</text>
  <rect x="320" y="206" width="560" height="3" rx="1.5" fill="#1e293b"/>
  <rect x="400" y="206" width="400" height="3" rx="1.5" fill="#a78bfa" opacity="0.9">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="600" y="248" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#38bdf8">github.com/DaCameraGirl/slicer-forge</text>
</svg>